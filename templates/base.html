<nav class="main-navbar">
    <div class="nav-container">
        <a href="/" class="nav-logo">
            <span>🚗</span> GarageGo
        </a>
        
        <button class="menu-toggle" id="mobile-menu" aria-label="Toggle navigation">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
        
        <ul class="nav-links" id="nav-links-menu">
            <li><a href="/" class="nav-item">Home</a></li>
            <li><a href="{% url 'car_bazaar:car_marketplace' %}" class="nav-item">Buy Cars</a></li>
            <li><a href="{% url 'car_bazaar:sell_car' %}" class="nav-item sell-btn">➕ Sell Your Car</a></li>
            {% if user.is_authenticated %}
                {% if user.is_superuser %}
                    <li><a href="{% url 'owner_dashboard' %}" class="nav-item admin-badge">👑 Owner Desk</a></li>
                {% else %}
                    <li><a href="{% url 'mechanic_dashboard' %}" class="nav-item dash-badge">🛠️ Dashboard</a></li>
                {% endif %}
                <li><a href="{% url 'mechanic_logout' %}" class="nav-item logout-btn">Logout</a></li>
            {% else %}
                <li><a href="{% url 'mechanic_login' %}" class="nav-item login-btn">Sign In</a></li>
            {% endif %}
        </ul>
    </div>
</nav>

<style>
    .main-navbar { 
        background: #1a1c23; 
        padding: 12px 20px; 
        position: sticky; 
        top: 0; 
        z-index: 1000; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
    }
    .nav-container { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        max-width: 1200px; 
        margin: auto; 
    }
    .nav-logo { 
        color: #ff5722; 
        font-size: 22px; 
        font-weight: 700; 
        text-decoration: none; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
    }
    .nav-links { 
        display: flex; 
        list-style: none; 
        align-items: center; 
        gap: 15px; 
        margin: 0;
        padding: 0;
    }
    .nav-item { 
        color: #cbd5e1; 
        text-decoration: none; 
        font-size: 14px; 
        font-weight: 500; 
        padding: 8px 16px; 
        border-radius: 8px; 
        transition: all 0.25s ease; 
        display: inline-block;
    }
    .nav-item:hover { 
        color: #fff; 
        background: rgba(255,255,255,0.08); 
    }
    
    /* Special Badges & Buttons */
    .sell-btn { background: #ff5722; color: white !important; font-weight: 600; }
    .sell-btn:hover { background: #e64a19 !important; }
    .admin-badge { background: #007bff; color: white !important; }
    .dash-badge { background: #28a745; color: white !important; }
    .logout-btn { color: #ef4444 !important; border: 1px solid rgba(239, 68, 68, 0.2); }
    .logout-btn:hover { background: #ef4444 !important; color: white !important; }

    /* Mobile Hamburger Trigger Styling */
    .menu-toggle { 
        display: none; 
        flex-direction: column; 
        background: none;
        border: none;
        cursor: pointer; 
        gap: 5px; 
        padding: 5px;
    }
    .menu-toggle .bar { 
        width: 22px; 
        height: 3px; 
        background: #cbd5e1; 
        border-radius: 2px; 
        transition: 0.3s;
    }

    /* 📱 RESPONSIVE MOBILE BREAKPOINT */
    @media (max-width: 768px) {
        .menu-toggle { 
            display: flex; 
        }
        .nav-links { 
            display: none; 
            flex-direction: column; 
            position: absolute; 
            top: 100%; 
            left: 0; 
            width: 100%; 
            background: #1a1c23; 
            padding: 20px; 
            gap: 12px; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        /* Active Class (Jab mobile me menu khulega) */
        .nav-links.active { 
            display: flex; 
        }
        .nav-item { 
            width: 100%; 
            text-align: center; 
            padding: 12px;
            font-size: 15px;
        }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links-menu');

        mobileMenu.addEventListener('click', function() {
            navLinks.classList.toggle('active');
            
            // Hamburger animation effect (Optional but premium feel)
            const bars = mobileMenu.querySelectorAll('.bar');
            if(navLinks.classList.contains('active')) {
                bars[0].style.transform = 'rotate(-45deg) translate(-5px, 6px)';
                bars[1].style.opacity = '0';
                bars[2].style.transform = 'rotate(45deg) translate(-4px, -5px)';
            } else {
                bars[0].style.transform = 'none';
                bars[1].style.opacity = '1';
                bars[2].style.transform = 'none';
            }
        });
    });
</script>
